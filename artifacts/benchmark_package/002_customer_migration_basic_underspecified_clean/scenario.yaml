scenario_id: 002_ERP_CUSTOMER_MIGRATION

name: ERP Customer Migration

domain: ERP Data Integration

description: >
  Customer master data is migrated from a legacy ERP system to a new ERP system
  as part of a system modernization project. The source system contains historical
  customer records, while the target system requires customer data in a new schema.
  Unlike the fully specified variant of this scenario, no formal schemas are
  provided here - only the input dataset and a small example of the expected
  target output.

business_objects:
  - Customer

systems:
  source:
    name: Legacy ERP System
    description: >
      Stores customer master data using the legacy data model.

  target:
    name: Target ERP System
    description: >
      Stores customer master data using the target data model required by the
      new ERP platform.
